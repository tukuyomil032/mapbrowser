browser:
  node-path: ""
  renderer-dir: "browser-renderer"
  ipc-port: 25600
  auto-restart: true
  max-restart-attempts: 3
  restart-delay: 30

screen:
  default-fps: 10
  max-fps: 30
  max-width: 8
  max-height: 8
  max-screens-per-world: 8
  render-distance: 64

security:
  allow-http: false
  block-local-network: true
  url-whitelist: []
  url-blacklist:
    - "*.onion"

youtube:
  use-ytdlp: true
  ytdlp-path: "yt-dlp"

audio:
  companion-mod-enabled: false
  channel: "mapbrowser:audio"
  max-distance: 32

items:
  pointer: FEATHER
  pointer-left: FEATHER
  pointer-right: FLINT
  back: BOW
  forward: ARROW
  reload: COMPASS
  url-bar: WRITABLE_BOOK
  text-input: WRITABLE_BOOK
  text-delete: SHEARS
  text-enter: PRISMARINE_SHARD
  scroll: MAGMA_CREAM
  scroll-up: SLIME_BALL
  scroll-down: MAGMA_CREAM

ui:
  simulate-particle: END_ROD
  language: en

storage: yaml
debug: false
